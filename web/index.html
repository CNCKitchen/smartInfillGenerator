<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InFEAll</title>
    <!-- Must run before the app: registers the COOP/COEP service worker and
         reloads once on first visit so threaded WASM gets isolation. -->
    <script src="/coi-serviceworker.js"></script>
    <link rel="preload" href="/fonts/barlow-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/barlow-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/b612-mono-400.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      /* pre-CSS paint: chassis gray instead of a white flash */
      html { background: #e7e6e1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
