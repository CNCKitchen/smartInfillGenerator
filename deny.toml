# cargo-deny configuration: enforces the dependency license policy from
# CONTRIBUTING.md. Run: cargo deny check licenses
# The dual-licensing (AGPL + commercial exceptions) model requires that the
# core never contains third-party copyleft code — see CONTRIBUTING.md.

[licenses]
# Workspace crates are AGPL-3.0-only but unpublished; don't lint our own.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "allow"

[advisories]
yanked = "warn"
